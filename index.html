<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raaz Chaudhary</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: #0f0f0f;
  color:white;
  text-align:center;
}

/* Main container */
.container{
  margin-top:60px;
}

/* Profile box */
.profile-box{
  margin:20px auto;
  padding:20px;
  width:85%;
  max-width:350px;
  background:#1a1a1a;
  border-radius:12px;
  box-shadow:0 0 15px rgba(0,255,213,0.2);
}

.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #00ffd5;
}

/* Buttons */
.btn{
  display:inline-block;
  margin:10px;
  padding:12px 20px;
  border-radius:8px;
  text-decoration:none;
  color:white;
  font-weight:bold;
}

.insta{background:#ff2d55;}
.telegram{background:#229ED9;}

/* Boxes */
.box{
  margin:20px auto;
  padding:20px;
  width:85%;
  max-width:350px;
  background:#1a1a1a;
  border-radius:12px;
  box-shadow:0 0 15px rgba(0,255,213,0.2);
}

h2{
  color:#00ffd5;
}

/* Input */
input{
  padding:10px;
  width:80%;
  border-radius:8px;
  border:none;
}

button{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#00ffd5;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.8;
}

</style>
</head>

<body>

<div class="container">

  <h1>Raazthinks</h1>

  <!-- Buttons -->
  <a class="btn insta" href="https://instagram.com/raxz_.x" target="_blank">Instagram</a>
  <a class="btn telegram" href="https://t.me/jaanuedittz" target="_blank">Telegram</a>

  <!-- Profile -->
  <div class="profile-box">
    <img src="profile.jpg" class="profile">
    <h3>Editz Creator ✨</h3>
  </div>

  <!-- Prompt Box -->
  <div class="box">
  <h2>Photo Prompt</h2>

  <input id="photoText" placeholder="Describe your image...">

  <button onclick="generateImage()">Generate</button>

  <p id="result"></p>
</div>

<script>
function generateImage(){
  let text = document.getElementById("photoText").value;

  if(text.trim() === ""){
    document.getElementById("result").innerText = "Please write prompt 😌";
  } else {
    document.getElementById("result").innerText = "Generating: " + text;
  }
}
</script>
  h2>Prompt</h2>
    <input id="txt" placeholder="Type here...">
    <br>
    <button onclick="go()">Send</button>
    <p id="out"></p>
  </div>

  <!-- Thoughts / Poetry -->
  <div class="box">
    <h2>Thoughts ✨</h2>
    <p>
      Jo likh nahi pata main lafzon me,<br>
      wo dil shayari ban ke nikal jata hai...
    </p>
  </div>

</div>

<script>
function go(){
  let t = document.getElementById("txt").value;
  document.getElementById("out").innerText = t;
}
</script>
<div class="box">
  <h2>Add Post</h2>

  <input id="title" placeholder="Title"><br><br>
  <input id="content" placeholder="Content"><br><br>

  <button onclick="addPost()">Post</button>

  <div id="posts"></div>
</div>

<script>
function addPost(){
  let t = document.getElementById("title").value;
  let c = document.getElementById("content").value;

  let post = "<h3>"+t+"</h3><p>"+c+"</p><hr>";

  document.getElementById("posts").innerHTML += post;
}
</script>
<img src="https://i.imgur.com/8Km9tLL.jpg" width="120">

</body>
</html>
